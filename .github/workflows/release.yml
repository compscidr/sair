name: Release

on:
  release:
    types: [created]

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          LDFLAGS="-s -w -X github.com/compscidr/sair/internal/version.Version=${VERSION}"
          mkdir -p dist
          go build -ldflags="${LDFLAGS}" -o dist/sair-device-source ./cmd/sair-device-source
          go build -ldflags="${LDFLAGS}" -o dist/sair-proxy ./cmd/sair-proxy
          cp tools/sair-acquire dist/
          cp tools/sair-release dist/
          cp -r systemd dist/

      - name: Archive
        run: |
          cd dist
          tar czf ../sair-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz *

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" sair-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push device-source
        uses: docker/build-push-action@v6
        with:
          context: .
          target: device-source
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.tag }}
          tags: |
            ghcr.io/compscidr/sair-device-source:${{ steps.version.outputs.tag }}
            ghcr.io/compscidr/sair-device-source:${{ steps.version.outputs.version }}
            ghcr.io/compscidr/sair-device-source:latest

      - name: Build and push proxy
        uses: docker/build-push-action@v6
        with:
          context: .
          target: proxy
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.tag }}
          tags: |
            ghcr.io/compscidr/sair-proxy:${{ steps.version.outputs.tag }}
            ghcr.io/compscidr/sair-proxy:${{ steps.version.outputs.version }}
            ghcr.io/compscidr/sair-proxy:latest
